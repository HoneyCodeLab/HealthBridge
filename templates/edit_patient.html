<!DOCTYPE html>

<html>
<head>
    <title>Edit Patient</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">Edit Patient</div>

<h2 style="text-align:center;">Edit Patient</h2>

<form method="POST">
    <label>Name</label>
    <input type="text" name="name" value="{{ patient[1] }}" required>

<label>Age</label>
<input type="number" name="age" value="{{ patient[2] }}" required>

<label>Gender</label>
<select name="gender">
    <option value="Male" {% if patient[3]=='Male' %}selected{% endif %}>Male</option>
    <option value="Female" {% if patient[3]=='Female' %}selected{% endif %}>Female</option>
</select>

<label>Contact</label>
<input type="text" name="contact" value="{{ patient[4] }}" required>

<label>Address</label>
<input type="text" name="address" value="{{ patient[5] }}" required>

<label>Disease</label>
<input type="text" name="disease" value="{{ patient[6] }}" required>

<input type="submit" value="Update Patient">

</form>

<br>
<div style="text-align:center;">
    <a href="/view_patients">Back</a>
</div>

</body>
</html>
