<!DOCTYPE html>

<html>
<head>
    <title>View Patients</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">All Patients</div>

<h2 style="text-align:center;">Patient Records</h2>

<table>
    <tr>
        <th>ID</th><th>Name</th><th>Age</th><th>Gender</th>
        <th>Contact</th><th>Address</th><th>Disease</th><th>Action</th>
    </tr>

{% for patient in patients %}
<tr>
    <td>{{ patient[0] }}</td>
    <td>{{ patient[1] }}</td>
    <td>{{ patient[2] }}</td>
    <td>{{ patient[3] }}</td>
    <td>{{ patient[4] }}</td>
    <td>{{ patient[5] }}</td>
    <td>{{ patient[6] }}</td>
    <td>
    <a href="/edit_patient/{{ patient[0] }}">Edit</a> |

    <form action="/delete_patient/{{ patient[0] }}" method="POST" style="display:inline;">
        <button type="submit" onclick="return confirm('Are you sure you want to delete this patient?')">
            Delete
        </button>
    </form>
</td>
</tr>
{% endfor %}


</table>

<br>
<div style="text-align:center;">
    <a href="/">Back</a>
</div>

</body>
</html>
